name: Build ESP32 OpenThread RCP firmware

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.firmware }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - firmware: generic-esp32c5.bin
            target: esp32c5
            install_target: esp32c5
            chip: esp32c5
            flash_freq: 80m
            xiao_external_antenna: false
          - firmware: generic-esp32c6.bin
            target: esp32c6
            install_target: esp32c6
            chip: esp32c6
            flash_freq: 80m
            xiao_external_antenna: false
          - firmware: generic-esp32h2.bin
            target: esp32h2
            install_target: esp32h2
            chip: esp32h2
            flash_freq: 48m
            xiao_external_antenna: false
          - firmware: xiao-esp32c6-external-antenna.bin
            target: esp32c6
            install_target: esp32c6
            chip: esp32c6
            flash_freq: 80m
            xiao_external_antenna: true
    env:
      IDF_REF: v6.0.1
      IDF_TOOLS_PATH: ${{ github.workspace }}/.espressif
      TARGET: ${{ matrix.target }}
      INSTALL_TARGET: ${{ matrix.install_target }}
      CHIP: ${{ matrix.chip }}
      FLASH_FREQ: ${{ matrix.flash_freq }}
      FIRMWARE: ${{ matrix.firmware }}
      EXAMPLE_DIR: examples/openthread/ot_rcp

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: ${{ env.IDF_TOOLS_PATH }}
          key: esp-idf-tools-${{ runner.os }}-${{ env.IDF_REF }}-${{ env.TARGET }}

      - name: Checkout ESP-IDF
        run: |
          git clone \
            --depth 1 \
            --recursive \
            --shallow-submodules \
            --branch "$IDF_REF" \
            https://github.com/espressif/esp-idf.git esp-idf

          cd esp-idf
          git submodule update --init --recursive --depth 1
          git rev-parse HEAD > ../idf-commit.txt

      - name: Apply USB UART retry patch
        run: |
          cd esp-idf
          git apply --check ../patches/0001-openthread-usb-uart-retry-send.patch
          git apply ../patches/0001-openthread-usb-uart-retry-send.patch

      - name: Configure XIAO ESP32-C6 external antenna
        if: ${{ matrix.xiao_external_antenna }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('esp-idf/examples/openthread/ot_rcp/main/esp_ot_rcp.c')
          text = path.read_text()
          text = text.replace('#include "esp_vfs_eventfd.h"\n', '#include "esp_vfs_eventfd.h"\n#include "driver/gpio.h"\n#include "freertos/FreeRTOS.h"\n#include "freertos/task.h"\n')
          marker = '#define TAG "ot_esp_rcp"\n'
          helper = '''#define TAG "ot_esp_rcp"\n\nstatic void xiao_select_external_antenna(void)\n{\n    gpio_set_direction(GPIO_NUM_3, GPIO_MODE_OUTPUT);\n    gpio_set_level(GPIO_NUM_3, 0);\n    vTaskDelay(pdMS_TO_TICKS(100));\n    gpio_set_direction(GPIO_NUM_14, GPIO_MODE_OUTPUT);\n    gpio_set_level(GPIO_NUM_14, 1);\n}\n'''
          text = text.replace(marker, helper)
          text = text.replace('void app_main(void)\n{\n', 'void app_main(void)\n{\n    xiao_select_external_antenna();\n\n')
          path.write_text(text)
          PY

      - name: Install ESP-IDF tools
        run: |
          cd esp-idf
          ./install.sh "$INSTALL_TARGET"

      - name: Build USB ot_rcp
        shell: bash
        run: |
          source esp-idf/export.sh
          cd "esp-idf/$EXAMPLE_DIR"

          export LC_ALL=C.UTF-8
          export TERM=xterm

          cat > sdkconfig.usb_rcp <<'EOF_CONFIG'
          CONFIG_OPENTHREAD_RCP_USB_SERIAL_JTAG=y
          EOF_CONFIG

          idf.py set-target "$TARGET"
          idf.py -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.usb_rcp" build

          grep -n 'OPENTHREAD_RCP' sdkconfig
          grep -n '^CONFIG_OPENTHREAD_RCP_USB_SERIAL_JTAG=y' sdkconfig

      - name: Create merged image
        shell: bash
        run: |
          source esp-idf/export.sh

          BUILD_DIR="esp-idf/$EXAMPLE_DIR/build"
          cd "$BUILD_DIR"

          python -m esptool --chip "$CHIP" merge-bin \
            --flash-mode dio \
            --flash-size 2MB \
            --flash-freq "$FLASH_FREQ" \
            --output result.bin \
            0x0 bootloader/bootloader.bin \
            0x8000 partition_table/partition-table.bin \
            0x10000 esp_ot_rcp.bin

      - name: Collect firmware artifacts
        shell: bash
        run: |
          BUILD_DIR="esp-idf/$EXAMPLE_DIR/build"
          mkdir -p artifacts

          cp "$BUILD_DIR/result.bin" "artifacts/$FIRMWARE"
          cp "$BUILD_DIR/esp_ot_rcp.bin" artifacts/
          cp "$BUILD_DIR/bootloader/bootloader.bin" artifacts/
          cp "$BUILD_DIR/partition_table/partition-table.bin" artifacts/
          cp idf-commit.txt artifacts/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.firmware }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub release
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release

          find release-assets -type f -name '*.bin' -print0 | while IFS= read -r -d '' file; do
            artifact="$(basename "$(dirname "$file")")"
            filename="$(basename "$file")"

            if [[ "$filename" == "$artifact" ]]; then
              cp "$file" "release/$filename"
            else
              cp "$file" "release/${artifact}-${filename}"
            fi
          done

          find release-assets -type f -name 'idf-commit.txt' -print0 | while IFS= read -r -d '' file; do
            artifact="$(basename "$(dirname "$file")")"
            cp "$file" "release/${artifact}-idf-commit.txt"
          done

          (cd release && sha256sum * > SHA256SUMS.txt)
          find release -maxdepth 1 -type f -print | sort

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" release/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
