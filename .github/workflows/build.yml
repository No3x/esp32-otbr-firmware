name: Build ESP32-C6 OpenThread RCP

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      IDF_REF: release/v6.0
      IDF_TOOLS_PATH: ${{ github.workspace }}/.espressif
      TARGET: esp32c6
      EXAMPLE_DIR: examples/openthread/ot_rcp
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: ${{ env.IDF_TOOLS_PATH }}
          key: esp-idf-tools-${{ runner.os }}-${{ env.IDF_REF }}-${{ env.TARGET }}

      - name: Checkout ESP-IDF
        run: |
          git clone --recursive --branch "$IDF_REF" https://github.com/espressif/esp-idf.git esp-idf
          cd esp-idf
          git submodule update --init --recursive
          git rev-parse HEAD > ../idf-commit.txt

      - name: Apply USB UART retry patch
        run: |
          cd esp-idf
          git apply --check ../patches/0001-openthread-usb-uart-retry-send.patch
          git apply ../patches/0001-openthread-usb-uart-retry-send.patch

      - name: Install ESP-IDF tools
        run: |
          cd esp-idf
          ./install.sh "$TARGET"

      - name: Build ot_rcp
        shell: bash
        run: |
          source esp-idf/export.sh
          cd "esp-idf/$EXAMPLE_DIR"
          idf.py set-target "$TARGET"
          idf.py build
          
      - name: Create merged image
        run: |
          BUILD_DIR="esp-idf/examples/openthread/ot_rcp/build"
          cd "$BUILD_DIR"
          esptool --chip esp32c6 merge-bin \
            --flash-mode dio \
            --flash-size 2MB \
            --flash-freq 80m \
            --output result.bin \
            0x0 bootloader/bootloader.bin \
            0x8000 partition_table/partition-table.bin \
            0x10000 esp_ot_rcp.bin
            
      - name: Collect firmware artifacts
        shell: bash
        run: |
          BUILD_DIR="esp-idf/examples/openthread/ot_rcp/build"
          mkdir -p artifacts

          cp "$BUILD_DIR/result.bin" artifacts/
              
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32c6-ot-rcp-patched
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
